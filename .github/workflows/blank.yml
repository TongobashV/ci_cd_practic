name: python-deployment # Назва workflow, яка відображатиметься в GitHub Actions UI
run-name: ${{ github.actor }} - ${{ github.ref_name }} # хто запустив та що запустили

on:
  push:
    branches: [main] # Запускати workflow при пуші в гілку main
  pull_request:
    branches: [main] # Запускати workflow при створенні pull request в гілку main

env:
  PYTHON_VERSION: 3.13 # Встановлюємо змінну середовища CI в true для позначення, що це середовище для безперервної інтеграції
jobs:
  python-ci:
    name: Python CI
    runs-on: ubuntu-latest # Використовувати останню версію Ubuntu для виконання job
    defaults:
      run:
        working-directory: ./src # Встановлюємо робочу директорію для всіх кроків в .src
    steps:
      - uses: actions/checkout@v4
        name: Setup Python 3.13
      - uses: actions/setup-python@v6
        with:
          python-version: "${{ env.PYTHON_VERSION }}" # Встановлюємо Python 3.13

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest pytest-cov
          pip install -r requirements.txt
      - name: Lint with flake8
        run: |
          cd ../
          flake8 . --show-source --statistics

      - name: Check Complexity
        run: |
          cd ../
          flake8 . --statistics --max-complexity=10 --exit-zero
      - name: Run unit tests with pytest
        run: |
          pytest -v --cov=. --cov-report=term-missing --cov-report=json
      - name: Upload python artifacts
        if: github.ref_name == 'main'
        uses: actions/upload-artifact@v4
        with:
          name: python-artifacts
          path: .
  build-image:
    name: Build and Push Image
    needs: ['python-ci']
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest

    steps:
    - uses: actions/download-artifact@v4
      with:
        name: python-artifacts
        path: .








        